name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  quality:
    name: Format, lint, types, architecture, tests, docs, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg18
        env:
          POSTGRES_DB: meridian_test
          POSTGRES_PASSWORD: meridian_test
          POSTGRES_USER: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meridian -d meridian_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://meridian:meridian_test@127.0.0.1:5432/meridian_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm deps:check
      - run: pnpm db:check
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm test:e2e:auth
      - run: pnpm docs:check
      - run: pnpm build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
