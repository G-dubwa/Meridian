              claimText: { type: string, minLength: 1, maxLength: 4000 }
              epistemicStatus: { type: string, const: reported_by_source }
              reviewStatus:
                {
                  type: string,
                  enum: [candidate, reviewed, rejected, superseded],
                }
              citations:
                type: array
                minItems: 1
                items:
                  type: object
                  additionalProperties: true
                  required:
                    [
                      sourceRevisionId,
                      sourceSpanStart,
                      sourceSpanEnd,
                      quotedTextHash,
                    ]
                  properties:
                    sourceRevisionId: { type: string, format: uuid }
                    sourceSpanStart: { type: integer, minimum: 0 }
                    sourceSpanEnd: { type: integer, minimum: 1 }
                    quotedTextHash: { type: string, pattern: '^[a-f0-9]{64}$' }
              version: { type: integer, minimum: 1 }
    ErrorResponseV1:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
          enum:
            [
              AUTHENTICATION_FAILED,
              CONFLICT,
              CSRF_INVALID,
              INTERNAL_ERROR,
              INTEGRATION_UNAVAILABLE,
              INVALID_AUTHORITY,
              NOT_FOUND,
              PROCESSING_CLASS_VIOLATION,
              PROHIBITED_ACTION,
              RATE_LIMITED,
              SESSION_INVALID,
              VALIDATION_FAILED,
            ]
  responses:
    Authenticated:
      description: Authenticated; hardened session and CSRF cookies are set.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AuthenticationResponseV1' }
    AuthenticationFailed:
      description: Generic credential or recovery failure.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    SessionInvalid:
      description: Missing, expired, revoked, or invalid session.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    CsrfInvalid:
      description: Missing or invalid CSRF proof.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    ValidationFailed:
      description: Request failed strict boundary validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    RateLimited:
      description: Authentication attempt rate limit reached.
      headers:
        Retry-After:
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    IntegrationUnavailable:
      description: Microsoft local configuration or active consent is unavailable.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
