              originalContentHash: { type: string, pattern: '^[a-f0-9]{64}$' }
              parsedText: { type: string }
              extractionQuality:
                {
                  type: string,
                  enum: [complete, partial, ocr_required, failed],
                }
              processingClass:
                { type: string, enum: [standard, sensitive, private] }
              chunkCount: { type: integer, minimum: 0 }
