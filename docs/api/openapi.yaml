openapi: 3.1.0
info:
  title: Meridian API
  version: 0.18.0
  description: Same-origin REST contract for owner authentication, journal evidence, Triage, internal tasks/reminders, provider-independent Today, goals, local planning, execution evidence, The Weekly, local knowledge ingestion, worker health, and Microsoft consent.
paths:
  /api/auth/csrf:
    get:
      operationId: getAuthenticationCsrf
      summary: Issue a short-lived pre-authentication CSRF value.
      responses:
        '200':
          description: CSRF cookie and matching response value.
          headers:
            Cache-Control:
              schema: { type: string, const: 'no-store, max-age=0' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CsrfResponseV1' }
  /api/auth/login:
    post:
      operationId: loginLocalOwner
      summary: Authenticate with the local owner passphrase.
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/auth/recovery:
    post:
      operationId: recoverLocalOwnerSession
      summary: Consume one recovery code and revoke prior sessions.
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecoveryLoginRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/auth/session:
    get:
      operationId: getLocalOwnerSession
      summary: Read active owner session metadata.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current session metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/auth/session/renew:
    post:
      operationId: renewLocalOwnerSession
      summary: Revoke the current session and issue a replacement.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/logout:
    post:
      operationId: logoutLocalOwner
      summary: Revoke the current session and clear authentication cookies.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '204': { description: Session revoked. }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/password:
    post:
      operationId: changeLocalOwnerPassword
      summary: Verify and change the owner passphrase, revoking other sessions.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequestV1' }
      responses:
        '204': { description: Password changed and other sessions revoked. }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/sessions/revoke:
    post:
      operationId: revokeLocalOwnerSessions
      summary: Revoke other sessions or every session.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RevokeSessionsRequestV1' }
      responses:
        '204': { description: Requested active sessions revoked. }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/journal/entries:
    get:
      operationId: listJournalEntries
      summary: List owner journal entries with their current revisions.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Owner-scoped journal timeline.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/JournalEntryListResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
    post:
      operationId: createJournalEntry
      summary: Create an entry and immutable first revision atomically.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateJournalEntryRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/journal/entries/{entryId}:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    get:
      operationId: getJournalEntry
      summary: Read one entry and its complete revision history.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/journal/entries/{entryId}/revisions:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: reviseJournalEntry
      summary: Append a revision and atomically advance current revision.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviseJournalEntryRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/entries/{entryId}/archive:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: archiveJournalEntry
      summary: Archive an active entry with optimistic concurrency.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JournalLifecycleRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/entries/{entryId}/deletion-request:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: requestJournalEntryHardDeletion
      summary: Record an explicitly confirmed hard-deletion request without deleting yet.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/JournalHardDeletionRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/activity:
    get:
      operationId: listJournalActivity
      summary: List content-free journal action events for the owner.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Newest-first journal activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JournalActivityResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/journal/revisions/{revisionId}/triage-proposals:
    post:
      operationId: proposeTriageItemsForRevision
      summary: Explicitly send one current Standard revision to the approved bounded extraction route.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - name: revisionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterpretRevisionRequestV1' }
      responses:
        '200':
          description: Clarification or no-action disposition.
          content:
            application/json:
              schema:
                {
                  $ref: '#/components/schemas/InterpretationDispositionResponseV1',
                }
        '201':
          description: One or more review-only Triage proposals were created.
          content:
            application/json:
              schema:
                {
                  $ref: '#/components/schemas/InterpretationDispositionResponseV1',
                }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/triage/proposals:
    get:
      operationId: listTriageProposals
      summary: List unexpired pending proposals for owner review.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Owner-scoped pending proposals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProposalListResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/triage/proposals/{proposalId}/decision:
    post:
      operationId: decideTriageProposal
      summary: Record an owner-confirmed accept, edited accept, or dismissal.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - name: proposalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProposalDecisionRequestV1' }
      responses:
        '200':
          description: Dismissal, or atomic owner-confirmed internal task/reminder target and receipt.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/ProposalDecisionResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/actions:
    get:
      operationId: listInternalActions
      summary: List owner-scoped canonical tasks and reminder intent.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Internal canonical action records; reminder delivery may be undecided.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionListResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/actions/tasks:
    post:
      operationId: createInternalTask
      summary: Execute one explicit deterministic internal task command.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTaskRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/actions/reminders:
    post:
      operationId: createInternalReminder
      summary: Execute one explicit reminder with an exact instant and recurrence meaning.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReminderRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/actions/commands/reminder:
    post:
      operationId: createInternalReminderFromBoundedCommand
      summary: Deterministically resolve the bounded explicit reminder grammar.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/ExplicitReminderCommandRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/actions/receipts/{receiptId}/task:
    post:
      operationId: editTaskFromReceipt
      summary: Edit an active internal task through its receipt.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/ReceiptIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EditTaskReceiptRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/actions/receipts/{receiptId}/reminder:
    post:
      operationId: editReminderFromReceipt
      summary: Edit scheduled internal reminder intent through its receipt.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/ReceiptIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/EditReminderReceiptRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/actions/receipts/{receiptId}/undo:
    post:
      operationId: undoActionReceipt
      summary: Undo creation while retaining the receipt and audit history.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/ReceiptIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UndoReceiptRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/goals:
    get:
      operationId: getLocalGoals
      summary: Read canonical goals, active edges, linked tasks, blockers, and soft load guidance.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Provider-independent local goal view.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoalSnapshotResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
    post:
      operationId: createLocalGoal
      summary: Create one owner-confirmed incubating goal.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateGoalRequestV1' }
      responses:
        '201':
          description: Canonical local goal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoalResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/goals/{goalId}/edit:
    post:
      operationId: editLocalGoal
      summary: Edit one non-terminal goal under its expected version.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/GoalIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateGoalRequestV1' }
      responses:
        '200':
          description: Updated canonical goal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoalResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/goals/{goalId}/transition:
    post:
      operationId: transitionLocalGoal
      summary: Apply one owner-confirmed goal lifecycle transition.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/GoalIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransitionGoalRequestV1' }
      responses:
        '200':
          description: Transitioned canonical goal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoalResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/goals/edges:
    post:
      operationId: createLocalResourceEdge
      summary: Create one registered owner-scoped resource relationship.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateEdgeRequestV1' }
      responses:
        '201':
          description: Canonical active edge.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EdgeResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/goals/edges/{edgeId}/remove:
    post:
      operationId: removeLocalResourceEdge
      summary: Terminally remove one version-matched non-merge edge.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/EdgeIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RemoveEdgeRequestV1' }
      responses:
        '200':
          description: Removed edge with retained audit state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EdgeResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/goals/load-limit:
    post:
      operationId: updateSoftActiveGoalLimit
      summary: Change the owner-configurable advisory active-goal guide.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateGoalLimitRequestV1' }
      responses:
        '200':
          description: Updated owner guide and timestamp.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoalLimitResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/planning:
    get:
      operationId: getLocalPlanning
      summary: Read deterministic local proposals, blocks, and eligible targets.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Local planning snapshot with inactive provider status.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/SchedulingSnapshotResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
    post:
      operationId: createLocalSchedulingProposal
      summary: Calculate and retain one exact deterministic local preview.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/CreateSchedulingProposalRequestV1' }
      responses:
        '201':
          description: Pending exact local proposal.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/SchedulingProposalResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/planning/{schedulingProposalId}/accept:
    post:
      operationId: acceptLocalSchedulingProposal
      summary: Revalidate and accept the exact preview into local plan blocks.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/SchedulingProposalIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SchedulingDecisionRequestV1' }
      responses:
        '200':
          description: Accepted or fail-closed stale proposal.
          content:
            application/json:
              schema:
