openapi: 3.1.0
info:
  title: Meridian API
  version: 0.6.0
  description: Same-origin REST contract for owner authentication, journal evidence, and worker health.
paths:
  /api/auth/csrf:
    get:
      operationId: getAuthenticationCsrf
      summary: Issue a short-lived pre-authentication CSRF value.
      responses:
        '200':
          description: CSRF cookie and matching response value.
          headers:
            Cache-Control:
              schema: { type: string, const: 'no-store, max-age=0' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CsrfResponseV1' }
  /api/auth/login:
    post:
      operationId: loginLocalOwner
      summary: Authenticate with the local owner passphrase.
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/auth/recovery:
    post:
      operationId: recoverLocalOwnerSession
      summary: Consume one recovery code and revoke prior sessions.
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecoveryLoginRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/auth/session:
    get:
      operationId: getLocalOwnerSession
      summary: Read active owner session metadata.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current session metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/auth/session/renew:
    post:
      operationId: renewLocalOwnerSession
      summary: Revoke the current session and issue a replacement.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/logout:
    post:
      operationId: logoutLocalOwner
      summary: Revoke the current session and clear authentication cookies.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '204': { description: Session revoked. }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/password:
    post:
      operationId: changeLocalOwnerPassword
      summary: Verify and change the owner passphrase, revoking other sessions.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequestV1' }
      responses:
        '204': { description: Password changed and other sessions revoked. }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/sessions/revoke:
    post:
      operationId: revokeLocalOwnerSessions
      summary: Revoke other sessions or every session.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RevokeSessionsRequestV1' }
      responses:
        '204': { description: Requested active sessions revoked. }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/journal/entries:
    get:
      operationId: listJournalEntries
      summary: List owner journal entries with their current revisions.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Owner-scoped journal timeline.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/JournalEntryListResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
    post:
      operationId: createJournalEntry
      summary: Create an entry and immutable first revision atomically.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateJournalEntryRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/journal/entries/{entryId}:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    get:
      operationId: getJournalEntry
      summary: Read one entry and its complete revision history.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/journal/entries/{entryId}/revisions:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: reviseJournalEntry
      summary: Append a revision and atomically advance current revision.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviseJournalEntryRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/entries/{entryId}/archive:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: archiveJournalEntry
      summary: Archive an active entry with optimistic concurrency.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JournalLifecycleRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/entries/{entryId}/deletion-request:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: requestJournalEntryHardDeletion
      summary: Record an explicitly confirmed hard-deletion request without deleting yet.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/JournalHardDeletionRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/activity:
    get:
      operationId: listJournalActivity
      summary: List content-free journal action events for the owner.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Newest-first journal activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JournalActivityResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/system/worker-health:
    get:
      operationId: getWorkerHealth
      summary: Read owner-scoped outbox and dead-letter health without event content.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Current durable work counts and newest terminal failures.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkerHealthResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-meridian-session
      description: Production cookie name; local development omits the __Host prefix.
  parameters:
    CsrfHeader:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string, minLength: 32, maxLength: 256 }
      description: Must match the CSRF cookie and, for active sessions, its stored binding.
    RequestIdHeader:
      name: X-Request-ID
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: Stable command correlation identity; reuse it when retrying the same mutation.
    EntryIdPath:
      name: entryId
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    AuthIdentifierV1:
      type: string
      minLength: 3
      maxLength: 64
      pattern: '^[a-z0-9][a-z0-9._-]*$'
    PassphraseV1:
      type: string
      minLength: 16
      maxLength: 1024
      writeOnly: true
    RecoveryCodeV1:
      type: string
      pattern: '^MRD-[A-Z2-9]{8}-[A-Z2-9]{8}$'
      writeOnly: true
    CsrfResponseV1:
      type: object
      additionalProperties: false
      required: [csrfToken]
      properties:
        csrfToken:
          { type: string, minLength: 32, maxLength: 256, writeOnly: true }
    LoginRequestV1:
      type: object
      additionalProperties: false
      required: [identifier, passphrase]
      properties:
        identifier: { $ref: '#/components/schemas/AuthIdentifierV1' }
        passphrase: { $ref: '#/components/schemas/PassphraseV1' }
    RecoveryLoginRequestV1:
      type: object
      additionalProperties: false
      required: [identifier, recoveryCode]
      properties:
        identifier: { $ref: '#/components/schemas/AuthIdentifierV1' }
        recoveryCode: { $ref: '#/components/schemas/RecoveryCodeV1' }
    AuthenticationResponseV1:
      type: object
      additionalProperties: false
      required: [authenticated, absoluteExpiresAt, idleExpiresAt]
      properties:
        authenticated: { type: boolean, const: true }
        absoluteExpiresAt: { type: string, format: date-time }
        idleExpiresAt: { type: string, format: date-time }
    SessionResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          authenticated,
          identifier,
          activeSessionCount,
          absoluteExpiresAt,
          idleExpiresAt,
        ]
      properties:
        authenticated: { type: boolean, const: true }
        identifier: { $ref: '#/components/schemas/AuthIdentifierV1' }
        activeSessionCount: { type: integer, minimum: 0 }
        absoluteExpiresAt: { type: string, format: date-time }
        idleExpiresAt: { type: string, format: date-time }
    ChangePasswordRequestV1:
      type: object
      additionalProperties: false
      required: [currentPassphrase, newPassphrase]
      properties:
        currentPassphrase: { $ref: '#/components/schemas/PassphraseV1' }
        newPassphrase: { $ref: '#/components/schemas/PassphraseV1' }
    RevokeSessionsRequestV1:
      type: object
      additionalProperties: false
      required: [includeCurrent]
      properties:
        includeCurrent: { type: boolean }
    ProcessingClassV1:
      type: string
      enum: [standard, sensitive, private]
    JournalEntryStatusV1:
      type: string
      enum: [active, archived, deletion_requested]
    CreateJournalEntryRequestV1:
      type: object
      additionalProperties: false
      required: [bodyMarkdown, processingClass]
      properties:
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
    ReviseJournalEntryRequestV1:
      type: object
      additionalProperties: false
      required: [bodyMarkdown, processingClass, expectedVersion]
      properties:
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
        expectedVersion: { type: integer, minimum: 1 }
    JournalLifecycleRequestV1:
      type: object
      additionalProperties: false
      required: [expectedVersion]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
    JournalHardDeletionRequestV1:
      type: object
      additionalProperties: false
      required: [confirmHardDeletion, expectedVersion]
      properties:
        confirmHardDeletion: { type: boolean, const: true }
        expectedVersion: { type: integer, minimum: 1 }
    JournalRevisionResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          revisionNumber,
          bodyMarkdown,
          occurredAt,
          processingClass,
          changeKind,
          createdAt,
          createdBy,
        ]
      properties:
        id: { type: string, format: uuid }
        revisionNumber: { type: integer, minimum: 1 }
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
        changeKind:
          { type: string, enum: [content, privacy, redaction, metadata] }
        createdAt: { type: string, format: date-time }
        createdBy: { type: string, enum: [user, system] }
    JournalEntrySummaryResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          status,
          version,
          processingClass,
          bodyMarkdown,
          occurredAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/JournalEntryStatusV1' }
        version: { type: integer, minimum: 1 }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    JournalEntryResponseV1:
      type: object
      additionalProperties: false
      required: [entry, revisions]
      properties:
        entry: { $ref: '#/components/schemas/JournalEntrySummaryResponseV1' }
        revisions:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/JournalRevisionResponseV1' }
    JournalEntryListResponseV1:
      type: object
      additionalProperties: false
      required: [entries]
      properties:
        entries:
          type: array
          items: { $ref: '#/components/schemas/JournalEntrySummaryResponseV1' }
    JournalActivityResponseV1:
      type: object
      additionalProperties: false
      required: [activity]
      properties:
        activity:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [eventId, eventType, occurredAt, entryId]
            properties:
              eventId: { type: string, format: uuid }
              eventType:
                type: string
                enum:
                  [
                    journal.entry_created.v1,
                    journal.entry_revised.v1,
                    journal.entry_privacy_changed.v1,
                    journal.entry_archived.v1,
                    journal.entry_deletion_requested.v1,
                  ]
              occurredAt: { type: string, format: date-time }
              entryId: { type: string, format: uuid }
    WorkerDeadLetterV1:
      type: object
      additionalProperties: false
      required:
        [
          attempts,
          createdAt,
          deadLetteredAt,
          domainEventId,
          errorCode,
          eventType,
          outboxMessageId,
        ]
      properties:
        attempts: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        deadLetteredAt: { type: string, format: date-time }
        domainEventId: { type: string, format: uuid }
        errorCode: { type: string, pattern: '^[A-Z][A-Z0-9_]{2,63}$' }
        eventType: { type: string, minLength: 1, maxLength: 160 }
        outboxMessageId: { type: string, format: uuid }
    WorkerHealthResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          pending,
          inFlight,
          succeeded,
          failed,
          uncertain,
          oldestUnfinishedAt,
          deadLetters,
        ]
      properties:
        pending: { type: integer, minimum: 0 }
        inFlight: { type: integer, minimum: 0 }
        succeeded: { type: integer, minimum: 0 }
        failed: { type: integer, minimum: 0 }
        uncertain: { type: integer, minimum: 0 }
        oldestUnfinishedAt: { type: [string, 'null'], format: date-time }
        deadLetters:
          type: array
          maxItems: 20
          items: { $ref: '#/components/schemas/WorkerDeadLetterV1' }
    ErrorResponseV1:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
          enum:
            [
              AUTHENTICATION_FAILED,
              CONFLICT,
              CSRF_INVALID,
              INTERNAL_ERROR,
              NOT_FOUND,
              RATE_LIMITED,
              SESSION_INVALID,
              VALIDATION_FAILED,
            ]
  responses:
    Authenticated:
      description: Authenticated; hardened session and CSRF cookies are set.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AuthenticationResponseV1' }
    AuthenticationFailed:
      description: Generic credential or recovery failure.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    SessionInvalid:
      description: Missing, expired, revoked, or invalid session.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    CsrfInvalid:
      description: Missing or invalid CSRF proof.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    ValidationFailed:
      description: Request failed strict boundary validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    RateLimited:
      description: Authentication attempt rate limit reached.
      headers:
        Retry-After:
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    JournalEntry:
      description: Current entry state and complete immutable revision history.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/JournalEntryResponseV1' }
    NotFound:
      description: The owner-scoped resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
    Conflict:
      description: Optimistic version or lifecycle state no longer permits the command.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseV1' }
x-document-metadata:
  purpose: Canonical local-owner authentication, journal, and worker-health REST contract.
  audience: Contributors, clients, and coding agents.
  authoritative-for: WP-04 authentication, WP-05 journal, and WP-06 health HTTP request and response shapes.
  update-triggers: Versioned API boundary schemas, authentication, journal, or system-health routes change.
  related-docs: conventions.md
