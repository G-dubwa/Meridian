    get:
      operationId: completeMicrosoftConnection
      summary: Consume one authorization code and one-time state, then redirect safely.
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 8192 }
        - name: state
          in: query
          required: false
          schema:
            {
              type: string,
              minLength: 32,
              maxLength: 256,
              pattern: '^[A-Za-z0-9_-]+$',
            }
        - name: error
          in: query
          required: false
          schema: { type: string }
      responses:
        '303':
          description: Redirect to Settings with only a generic connected or failed outcome.
