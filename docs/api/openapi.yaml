      summary: Create one encrypted PKCE session and return the consumers authorization URL.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '200':
          description: One-time Microsoft authorization destination.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/MicrosoftConnectResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
