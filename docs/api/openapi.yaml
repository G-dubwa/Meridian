openapi: 3.1.0
info:
  title: Meridian API
  version: 0.11.0
  description: Same-origin REST contract for owner authentication, journal evidence, Triage, internal tasks/reminders, worker health, and Microsoft consent.
paths:
  /api/auth/csrf:
    get:
      operationId: getAuthenticationCsrf
      summary: Issue a short-lived pre-authentication CSRF value.
      responses:
        '200':
          description: CSRF cookie and matching response value.
          headers:
            Cache-Control:
              schema: { type: string, const: 'no-store, max-age=0' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CsrfResponseV1' }
  /api/auth/login:
    post:
      operationId: loginLocalOwner
      summary: Authenticate with the local owner passphrase.
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/auth/recovery:
    post:
      operationId: recoverLocalOwnerSession
      summary: Consume one recovery code and revoke prior sessions.
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecoveryLoginRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/auth/session:
    get:
      operationId: getLocalOwnerSession
      summary: Read active owner session metadata.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current session metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/auth/session/renew:
    post:
      operationId: renewLocalOwnerSession
      summary: Revoke the current session and issue a replacement.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '200': { $ref: '#/components/responses/Authenticated' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/logout:
    post:
      operationId: logoutLocalOwner
      summary: Revoke the current session and clear authentication cookies.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '204': { description: Session revoked. }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/password:
    post:
      operationId: changeLocalOwnerPassword
      summary: Verify and change the owner passphrase, revoking other sessions.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequestV1' }
      responses:
        '204': { description: Password changed and other sessions revoked. }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/auth/sessions/revoke:
    post:
      operationId: revokeLocalOwnerSessions
      summary: Revoke other sessions or every session.
      security:
        - sessionCookie: []
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RevokeSessionsRequestV1' }
      responses:
        '204': { description: Requested active sessions revoked. }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/journal/entries:
    get:
      operationId: listJournalEntries
      summary: List owner journal entries with their current revisions.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Owner-scoped journal timeline.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/JournalEntryListResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
    post:
      operationId: createJournalEntry
      summary: Create an entry and immutable first revision atomically.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateJournalEntryRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/journal/entries/{entryId}:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    get:
      operationId: getJournalEntry
      summary: Read one entry and its complete revision history.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/journal/entries/{entryId}/revisions:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: reviseJournalEntry
      summary: Append a revision and atomically advance current revision.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviseJournalEntryRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/entries/{entryId}/archive:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: archiveJournalEntry
      summary: Archive an active entry with optimistic concurrency.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JournalLifecycleRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/entries/{entryId}/deletion-request:
    parameters: [{ $ref: '#/components/parameters/EntryIdPath' }]
    post:
      operationId: requestJournalEntryHardDeletion
      summary: Record an explicitly confirmed hard-deletion request without deleting yet.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/JournalHardDeletionRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/JournalEntry' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/journal/activity:
    get:
      operationId: listJournalActivity
      summary: List content-free journal action events for the owner.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Newest-first journal activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JournalActivityResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/journal/revisions/{revisionId}/triage-proposals:
    post:
      operationId: proposeTriageItemsForRevision
      summary: Explicitly send one current Standard revision to the approved bounded extraction route.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - name: revisionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterpretRevisionRequestV1' }
      responses:
        '200':
          description: Clarification or no-action disposition.
          content:
            application/json:
              schema:
                {
                  $ref: '#/components/schemas/InterpretationDispositionResponseV1',
                }
        '201':
          description: One or more review-only Triage proposals were created.
          content:
            application/json:
              schema:
                {
                  $ref: '#/components/schemas/InterpretationDispositionResponseV1',
                }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/triage/proposals:
    get:
      operationId: listTriageProposals
      summary: List unexpired pending proposals for owner review.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Owner-scoped pending proposals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProposalListResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/triage/proposals/{proposalId}/decision:
    post:
      operationId: decideTriageProposal
      summary: Record an owner-confirmed accept, edited accept, or dismissal.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - name: proposalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProposalDecisionRequestV1' }
      responses:
        '200':
          description: Dismissal, or atomic owner-confirmed internal task/reminder target and receipt.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/ProposalDecisionResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/actions:
    get:
      operationId: listInternalActions
      summary: List owner-scoped canonical tasks and reminder intent.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Internal canonical action records; reminder delivery may be undecided.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionListResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/actions/tasks:
    post:
      operationId: createInternalTask
      summary: Execute one explicit deterministic internal task command.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTaskRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/actions/reminders:
    post:
      operationId: createInternalReminder
      summary: Execute one explicit reminder with an exact instant and recurrence meaning.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReminderRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/actions/commands/reminder:
    post:
      operationId: createInternalReminderFromBoundedCommand
      summary: Deterministically resolve the bounded explicit reminder grammar.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/ExplicitReminderCommandRequestV1' }
      responses:
        '201': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
  /api/actions/receipts/{receiptId}/task:
    post:
      operationId: editTaskFromReceipt
      summary: Edit an active internal task through its receipt.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/ReceiptIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EditTaskReceiptRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/actions/receipts/{receiptId}/reminder:
    post:
      operationId: editReminderFromReceipt
      summary: Edit scheduled internal reminder intent through its receipt.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/ReceiptIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/EditReminderReceiptRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/actions/receipts/{receiptId}/undo:
    post:
      operationId: undoActionReceipt
      summary: Undo creation while retaining the receipt and audit history.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
        - { $ref: '#/components/parameters/ReceiptIdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UndoReceiptRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/ActionReceipt' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/system/worker-health:
    get:
      operationId: getWorkerHealth
      summary: Read owner-scoped outbox and dead-letter health without event content.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Current durable work counts and newest terminal failures.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkerHealthResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
  /api/integrations/microsoft:
    get:
      operationId: getMicrosoftConnection
      summary: Read owner-scoped Microsoft connection and consent status without tokens.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Connection state, exact Stage-A scopes, and append-only consent history.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/MicrosoftConnectionStatusV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
    post:
      operationId: beginMicrosoftConnection
      summary: Create one encrypted PKCE session and return the consumers authorization URL.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '200':
          description: One-time Microsoft authorization destination.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/MicrosoftConnectResponseV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/integrations/microsoft/callback:
    get:
      operationId: completeMicrosoftConnection
      summary: Consume one authorization code and one-time state, then redirect safely.
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 8192 }
        - name: state
          in: query
          required: false
          schema:
            {
              type: string,
              minLength: 32,
              maxLength: 256,
              pattern: '^[A-Za-z0-9_-]+$',
            }
        - name: error
          in: query
          required: false
          schema: { type: string }
      responses:
        '303':
          description: Redirect to Settings with only a generic connected or failed outcome.
  /api/integrations/microsoft/disconnect:
    post:
      operationId: disconnectMicrosoft
      summary: Remove stored provider tokens and append consent/event evidence.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/MicrosoftDisconnectRequestV1' }
      responses:
        '200':
          description: Disconnected connection and updated consent status.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/MicrosoftConnectionStatusV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/integrations/microsoft/todo:
    get:
      operationId: getMicrosoftTodoExperimentalStatus
      summary: Read local experimental list/task state without Microsoft identifiers or Graph access.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Content-free local experimental status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MicrosoftTodoStatusV1' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/integrations/microsoft/todo/consent:
    post:
      operationId: beginMicrosoftTodoIncrementalConsent
      summary: Create the exact six-scope authorization URL without calling Graph.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/MicrosoftTodoConsentRequestV1' }
      responses:
        '200':
          description: One-time incremental authorization destination.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/MicrosoftConnectResponseV1' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/integrations/microsoft/todo/first-day:
    post:
      operationId: createMicrosoftTodoFirstDayTest
      summary: Create one owner-confirmed canonical synthetic occurrence and contained mirror.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/MicrosoftTodoFirstDayRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/MicrosoftTodoStatus' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/integrations/microsoft/todo/reconcile:
    post:
      operationId: reconcileMicrosoftTodoFirstDayTest
      summary: Read only the exact bound task and observe phone completion.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/MicrosoftTodoReconcileRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/MicrosoftTodoStatus' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/integrations/microsoft/todo/cleanup:
    post:
      operationId: cleanupMicrosoftTodoFirstDayTest
      summary: Delete only marker-verified synthetic objects after a fresh containment check.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/MicrosoftTodoCleanupRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/MicrosoftTodoStatus' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
  /api/integrations/microsoft/todo/suspend:
    post:
      operationId: suspendMicrosoftTodoGraph
      summary: Erase local Microsoft tokens and suspend Graph access without a provider request.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - { $ref: '#/components/parameters/RequestIdHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: '#/components/schemas/MicrosoftTodoSuspendRequestV1' }
      responses:
        '200': { $ref: '#/components/responses/MicrosoftTodoStatus' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
        '503': { $ref: '#/components/responses/IntegrationUnavailable' }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-meridian-session
      description: Production cookie name; local development omits the __Host prefix.
  parameters:
    CsrfHeader:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string, minLength: 32, maxLength: 256 }
      description: Must match the CSRF cookie and, for active sessions, its stored binding.
    RequestIdHeader:
      name: X-Request-ID
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: Stable command correlation identity; reuse it when retrying the same mutation.
    EntryIdPath:
      name: entryId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReceiptIdPath:
      name: receiptId
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    AuthIdentifierV1:
      type: string
      minLength: 3
      maxLength: 64
      pattern: '^[a-z0-9][a-z0-9._-]*$'
    PassphraseV1:
      type: string
      minLength: 16
      maxLength: 1024
      writeOnly: true
    RecoveryCodeV1:
      type: string
      pattern: '^MRD-[A-Z2-9]{8}-[A-Z2-9]{8}$'
      writeOnly: true
    MicrosoftStageAScopesV1:
      type: array
      minItems: 5
      maxItems: 5
      uniqueItems: true
      prefixItems:
        - { type: string, const: openid }
        - { type: string, const: profile }
        - { type: string, const: offline_access }
        - { type: string, const: User.Read }
        - { type: string, const: Calendars.Read }
      items: false
    MicrosoftTodoRequestedScopesV1:
      type: array
      minItems: 6
      maxItems: 6
      uniqueItems: true
      prefixItems:
        - { type: string, const: openid }
        - { type: string, const: profile }
        - { type: string, const: offline_access }
        - { type: string, const: User.Read }
        - { type: string, const: Calendars.Read }
        - { type: string, const: Tasks.ReadWrite }
      items: false
    MicrosoftRequestedScopesV1:
      oneOf:
        - { $ref: '#/components/schemas/MicrosoftStageAScopesV1' }
        - { $ref: '#/components/schemas/MicrosoftTodoRequestedScopesV1' }
    MicrosoftStageAGraphPermissionsV1:
      type: array
      minItems: 2
      maxItems: 2
      uniqueItems: true
      prefixItems:
        - { type: string, const: User.Read }
        - { type: string, const: Calendars.Read }
      items: false
    MicrosoftTodoGraphPermissionsV1:
      type: array
      minItems: 3
      maxItems: 3
      uniqueItems: true
      prefixItems:
        - { type: string, const: User.Read }
        - { type: string, const: Calendars.Read }
        - { type: string, const: Tasks.ReadWrite }
      items: false
    MicrosoftGraphPermissionsV1:
      oneOf:
        - { $ref: '#/components/schemas/MicrosoftStageAGraphPermissionsV1' }
        - { $ref: '#/components/schemas/MicrosoftTodoGraphPermissionsV1' }
    MicrosoftConnectResponseV1:
      type: object
      additionalProperties: false
      required: [authorizationUrl]
      properties:
        authorizationUrl: { type: string, format: uri }
    MicrosoftDisconnectRequestV1:
      type: object
      additionalProperties: false
      required: [confirmation]
      properties:
        confirmation: { type: string, const: DISCONNECT }
    MicrosoftTodoConsentRequestV1:
      type: object
      additionalProperties: false
      required: [confirmation]
      properties:
        confirmation: { type: string, const: ENABLE WP11 TODO CONSENT }
    MicrosoftTodoFirstDayRequestV1:
      type: object
      additionalProperties: false
      required: [confirmation, idempotencyKey, reminderAt]
      properties:
        confirmation: { type: string, const: CREATE WP11 FIRST-DAY TEST }
        idempotencyKey: { type: string, format: uuid }
        reminderAt: { type: string, format: date-time }
    MicrosoftTodoReconcileRequestV1:
      type: object
      additionalProperties: false
      required: [confirmation]
      properties:
        confirmation: { type: string, const: OBSERVE WP11 COMPLETION }
    MicrosoftTodoCleanupRequestV1:
      type: object
      additionalProperties: false
      required: [confirmation]
      properties:
        confirmation: { type: string, const: DELETE WP11 SYNTHETIC OBJECTS }
    MicrosoftTodoSuspendRequestV1:
      type: object
      additionalProperties: false
      required: [confirmation]
      properties:
        confirmation: { type: string, const: SUSPEND WP11 GRAPH }
    MicrosoftTodoStatusV1:
      type: object
      additionalProperties: false
      required: [listStatus, reminderAt, taskStatus]
      properties:
        listStatus:
          anyOf:
            - {
                type: string,
                enum: [experimental, suspended, unmanaged, cleaned],
              }
            - { type: 'null' }
        reminderAt:
          anyOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        taskStatus:
          anyOf:
            - {
                type: string,
                enum:
                  [
                    pending,
                    completed,
                    deleted,
                    orphaned,
                    conflicted,
                    unmanaged,
                    cleaned,
                  ],
              }
            - { type: 'null' }
    MicrosoftConsentRecordV1:
      type: object
      additionalProperties: false
      required: [action, occurredAt, requestedScopes, graphPermissions]
      properties:
        action:
          type: string
          enum: [granted, disconnected, reauthorization_required]
        occurredAt: { type: string, format: date-time }
        requestedScopes:
          { $ref: '#/components/schemas/MicrosoftRequestedScopesV1' }
        graphPermissions:
          { $ref: '#/components/schemas/MicrosoftGraphPermissionsV1' }
    MicrosoftConnectionAccountV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          displayName,
          status,
          requestedScopes,
          graphPermissions,
          connectedAt,
          disconnectedAt,
          lastRefreshedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string, minLength: 1, maxLength: 255 }
        status:
          type: string
          enum: [connected, disconnected, reauthorization_required]
        requestedScopes:
          { $ref: '#/components/schemas/MicrosoftRequestedScopesV1' }
        graphPermissions:
          { $ref: '#/components/schemas/MicrosoftGraphPermissionsV1' }
        connectedAt: { type: string, format: date-time }
        disconnectedAt:
          anyOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        lastRefreshedAt:
          anyOf:
            - { type: string, format: date-time }
            - { type: 'null' }
    MicrosoftConnectionStatusV1:
      type: object
      additionalProperties: false
      required:
        [configured, requestedScopes, account, consentRecords, todoConsent]
      properties:
        configured: { type: boolean }
        requestedScopes:
          { $ref: '#/components/schemas/MicrosoftStageAScopesV1' }
        account:
          anyOf:
            - { $ref: '#/components/schemas/MicrosoftConnectionAccountV1' }
            - { type: 'null' }
        consentRecords:
          type: array
          items: { $ref: '#/components/schemas/MicrosoftConsentRecordV1' }
        todoConsent:
          type: object
          additionalProperties: false
          required: [eligible, expectedGraphPermissions, requestedScopes]
          properties:
            eligible: { type: boolean }
            expectedGraphPermissions:
              { $ref: '#/components/schemas/MicrosoftTodoGraphPermissionsV1' }
            requestedScopes:
              { $ref: '#/components/schemas/MicrosoftTodoRequestedScopesV1' }
    CsrfResponseV1:
      type: object
      additionalProperties: false
      required: [csrfToken]
      properties:
        csrfToken:
          { type: string, minLength: 32, maxLength: 256, writeOnly: true }
    LoginRequestV1:
      type: object
      additionalProperties: false
      required: [identifier, passphrase]
      properties:
        identifier: { $ref: '#/components/schemas/AuthIdentifierV1' }
        passphrase: { $ref: '#/components/schemas/PassphraseV1' }
    RecoveryLoginRequestV1:
      type: object
      additionalProperties: false
      required: [identifier, recoveryCode]
      properties:
        identifier: { $ref: '#/components/schemas/AuthIdentifierV1' }
        recoveryCode: { $ref: '#/components/schemas/RecoveryCodeV1' }
    AuthenticationResponseV1:
      type: object
      additionalProperties: false
      required: [authenticated, absoluteExpiresAt, idleExpiresAt]
      properties:
        authenticated: { type: boolean, const: true }
        absoluteExpiresAt: { type: string, format: date-time }
        idleExpiresAt: { type: string, format: date-time }
    SessionResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          authenticated,
          identifier,
          activeSessionCount,
          absoluteExpiresAt,
          idleExpiresAt,
        ]
      properties:
        authenticated: { type: boolean, const: true }
        identifier: { $ref: '#/components/schemas/AuthIdentifierV1' }
        activeSessionCount: { type: integer, minimum: 0 }
        absoluteExpiresAt: { type: string, format: date-time }
        idleExpiresAt: { type: string, format: date-time }
    ChangePasswordRequestV1:
      type: object
      additionalProperties: false
      required: [currentPassphrase, newPassphrase]
      properties:
        currentPassphrase: { $ref: '#/components/schemas/PassphraseV1' }
        newPassphrase: { $ref: '#/components/schemas/PassphraseV1' }
    RevokeSessionsRequestV1:
      type: object
      additionalProperties: false
      required: [includeCurrent]
      properties:
        includeCurrent: { type: boolean }
    ProcessingClassV1:
      type: string
      enum: [standard, sensitive, private]
    JournalEntryStatusV1:
      type: string
      enum: [active, archived, deletion_requested]
    CreateJournalEntryRequestV1:
      type: object
      additionalProperties: false
      required: [bodyMarkdown, processingClass]
      properties:
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
    ReviseJournalEntryRequestV1:
      type: object
      additionalProperties: false
      required: [bodyMarkdown, processingClass, expectedVersion]
      properties:
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
        expectedVersion: { type: integer, minimum: 1 }
    JournalLifecycleRequestV1:
      type: object
      additionalProperties: false
      required: [expectedVersion]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
    JournalHardDeletionRequestV1:
      type: object
      additionalProperties: false
      required: [confirmHardDeletion, expectedVersion]
      properties:
        confirmHardDeletion: { type: boolean, const: true }
        expectedVersion: { type: integer, minimum: 1 }
    JournalRevisionResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          revisionNumber,
          bodyMarkdown,
          occurredAt,
          processingClass,
          changeKind,
          createdAt,
          createdBy,
        ]
      properties:
        id: { type: string, format: uuid }
        revisionNumber: { type: integer, minimum: 1 }
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
        changeKind:
          { type: string, enum: [content, privacy, redaction, metadata] }
        createdAt: { type: string, format: date-time }
        createdBy: { type: string, enum: [user, system] }
    JournalEntrySummaryResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          status,
          version,
          processingClass,
          bodyMarkdown,
          occurredAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/JournalEntryStatusV1' }
        version: { type: integer, minimum: 1 }
        processingClass: { $ref: '#/components/schemas/ProcessingClassV1' }
        bodyMarkdown: { type: string, minLength: 1, maxLength: 100000 }
        occurredAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    JournalEntryResponseV1:
      type: object
      additionalProperties: false
      required: [entry, revisions]
      properties:
        entry: { $ref: '#/components/schemas/JournalEntrySummaryResponseV1' }
        revisions:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/JournalRevisionResponseV1' }
    JournalEntryListResponseV1:
      type: object
      additionalProperties: false
      required: [entries]
      properties:
        entries:
          type: array
          items: { $ref: '#/components/schemas/JournalEntrySummaryResponseV1' }
    JournalActivityResponseV1:
      type: object
      additionalProperties: false
      required: [activity]
      properties:
        activity:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [eventId, eventType, occurredAt, entryId]
            properties:
              eventId: { type: string, format: uuid }
              eventType:
                type: string
                enum:
                  [
                    journal.entry_created.v1,
                    journal.entry_revised.v1,
                    journal.entry_privacy_changed.v1,
                    journal.entry_archived.v1,
                    journal.entry_deletion_requested.v1,
                  ]
              occurredAt: { type: string, format: date-time }
              entryId: { type: string, format: uuid }
    ExplicitInternalAuthorityV1:
      type: object
      additionalProperties: false
      required:
        [explicit, deterministic, ambiguous, externalEffect, ownerConfirmed]
      properties:
        explicit: { type: boolean, const: true }
        deterministic: { type: boolean, const: true }
        ambiguous: { type: boolean, const: false }
        externalEffect: { type: boolean, const: false }
        ownerConfirmed: { type: boolean, const: true }
    RecurrenceRuleV1:
      type: object
      additionalProperties: false
      required: [schemaVersion, frequency, interval, weekDays, until]
      properties:
        schemaVersion: { type: integer, const: 1 }
        frequency: { type: string, enum: [daily, weekly] }
        interval: { type: integer, minimum: 1, maximum: 52 }
        weekDays:
          type: array
          maxItems: 7
          uniqueItems: true
          items: { type: integer, minimum: 1, maximum: 7 }
        until: { type: [string, 'null'], format: date-time }
    CreateTaskRequestV1:
      type: object
      additionalProperties: false
      required:
        [authority, dueAt, estimateMinutes, goalResourceId, kind, notes, title]
      properties:
        authority: { $ref: '#/components/schemas/ExplicitInternalAuthorityV1' }
        dueAt: { type: [string, 'null'], format: date-time }
        estimateMinutes: { type: [integer, 'null'], minimum: 1, maximum: 10080 }
        goalResourceId: { type: [string, 'null'], format: uuid }
        kind: { type: string, enum: [task, commitment, routine, milestone] }
        notes: { type: string, maxLength: 2000 }
        title: { type: string, minLength: 1, maxLength: 240 }
    CreateReminderRequestV1:
      type: object
      additionalProperties: false
      required:
        [
          authority,
          expiresAt,
          priority,
          purpose,
          recurrence,
          relatedResourceId,
          timeZone,
          triggerAt,
        ]
      properties:
        authority: { $ref: '#/components/schemas/ExplicitInternalAuthorityV1' }
        expiresAt: { type: [string, 'null'], format: date-time }
        priority: { type: string, enum: [low, normal, high] }
        purpose: { type: string, minLength: 1, maxLength: 500 }
        recurrence:
          anyOf:
            - { $ref: '#/components/schemas/RecurrenceRuleV1' }
            - { type: 'null' }
        relatedResourceId: { type: [string, 'null'], format: uuid }
        timeZone: { type: string, minLength: 1, maxLength: 100 }
        triggerAt: { type: string, format: date-time }
    ExplicitReminderCommandRequestV1:
      type: object
      additionalProperties: false
      required: [command, ownerConfirmed, timeZone]
      properties:
        command: { type: string, minLength: 1, maxLength: 1000 }
        ownerConfirmed: { type: boolean, const: true }
        timeZone: { type: string, minLength: 1, maxLength: 100 }
    EditTaskReceiptRequestV1:
      type: object
      additionalProperties: false
      required:
        [
          dueAt,
          estimateMinutes,
          expectedReceiptVersion,
          expectedTargetVersion,
          kind,
          notes,
          ownerConfirmed,
          title,
        ]
      properties:
        dueAt: { type: [string, 'null'], format: date-time }
        estimateMinutes: { type: [integer, 'null'], minimum: 1, maximum: 10080 }
        expectedReceiptVersion: { type: integer, minimum: 1 }
        expectedTargetVersion: { type: integer, minimum: 1 }
        kind: { type: string, enum: [task, commitment, routine, milestone] }
        notes: { type: string, maxLength: 2000 }
        ownerConfirmed: { type: boolean, const: true }
        title: { type: string, minLength: 1, maxLength: 240 }
    EditReminderReceiptRequestV1:
      type: object
      additionalProperties: false
      required:
        [
          expiresAt,
          expectedReceiptVersion,
          expectedTargetVersion,
          ownerConfirmed,
          priority,
          purpose,
          recurrence,
          timeZone,
          triggerAt,
        ]
      properties:
        expiresAt: { type: [string, 'null'], format: date-time }
        expectedReceiptVersion: { type: integer, minimum: 1 }
        expectedTargetVersion: { type: integer, minimum: 1 }
        ownerConfirmed: { type: boolean, const: true }
        priority: { type: string, enum: [low, normal, high] }
        purpose: { type: string, minLength: 1, maxLength: 500 }
        recurrence:
          anyOf:
            - { $ref: '#/components/schemas/RecurrenceRuleV1' }
            - { type: 'null' }
        timeZone: { type: string, minLength: 1, maxLength: 100 }
        triggerAt: { type: string, format: date-time }
    UndoReceiptRequestV1:
      type: object
      additionalProperties: false
      required: [expectedVersion, ownerConfirmed]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        ownerConfirmed: { type: boolean, const: true }
    TaskResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          resourceId,
          goalResourceId,
          kind,
          title,
          notes,
          estimateMinutes,
          dueAt,
          state,
          creationAuthority,
          sourceProposalId,
          createdAt,
          updatedAt,
          version,
        ]
      properties:
        id: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        goalResourceId: { type: [string, 'null'], format: uuid }
        kind: { type: string, enum: [task, commitment, routine, milestone] }
        title: { type: string }
        notes: { type: string }
        estimateMinutes: { type: [integer, 'null'] }
        dueAt: { type: [string, 'null'], format: date-time }
        state:
          { type: string, enum: [open, scheduled, done, dropped, superseded] }
        creationAuthority:
          { type: string, enum: [manual, explicit_command, accepted_proposal] }
        sourceProposalId: { type: [string, 'null'], format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
    ReminderResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          resourceId,
          relatedResourceId,
          purpose,
          triggerAt,
          timeZone,
          recurrence,
          deliveryPolicy,
          priority,
          quietHoursBehavior,
          expiresAt,
          state,
          creationAuthority,
          sourceProposalId,
          ownerFeedback,
          createdAt,
          updatedAt,
          version,
        ]
      properties:
        id: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        relatedResourceId: { type: [string, 'null'], format: uuid }
        purpose: { type: string }
        triggerAt: { type: string, format: date-time }
        timeZone: { type: string }
        recurrence:
          anyOf:
            - { $ref: '#/components/schemas/RecurrenceRuleV1' }
            - { type: 'null' }
        deliveryPolicy: { type: string, const: undecided }
        priority: { type: string, enum: [low, normal, high] }
        quietHoursBehavior: { type: string, const: defer }
        expiresAt: { type: [string, 'null'], format: date-time }
        state:
          {
            type: string,
            enum:
              [
                scheduled,
                due,
                delivered,
                completed,
                dismissed,
                snoozed,
                paused,
                expired,
              ],
          }
        creationAuthority:
          { type: string, enum: [manual, explicit_command, accepted_proposal] }
        sourceProposalId: { type: [string, 'null'], format: uuid }
        ownerFeedback: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
    CommandReceiptResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          targetResourceId,
          targetType,
          status,
          createdAt,
          updatedAt,
          undoneAt,
          version,
        ]
      properties:
        id: { type: string, format: uuid }
        targetResourceId: { type: string, format: uuid }
        targetType: { type: string, enum: [task, reminder] }
        status: { type: string, enum: [active, undone] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        undoneAt: { type: [string, 'null'], format: date-time }
        version: { type: integer, minimum: 1 }
    ActionTargetResponseV1:
      oneOf:
        - type: object
          additionalProperties: false
          required: [targetType, task]
          properties:
            targetType: { type: string, const: task }
            task: { $ref: '#/components/schemas/TaskResponseV1' }
        - type: object
          additionalProperties: false
          required: [targetType, reminder]
          properties:
            targetType: { type: string, const: reminder }
            reminder: { $ref: '#/components/schemas/ReminderResponseV1' }
    ActionReceiptResponseV1:
      type: object
      additionalProperties: false
      required: [receipt, target]
      properties:
        receipt: { $ref: '#/components/schemas/CommandReceiptResponseV1' }
        target: { $ref: '#/components/schemas/ActionTargetResponseV1' }
    ActionListResponseV1:
      type: object
      additionalProperties: false
      required: [tasks, reminders]
      properties:
        tasks:
          type: array
          items: { $ref: '#/components/schemas/TaskResponseV1' }
        reminders:
          type: array
          items: { $ref: '#/components/schemas/ReminderResponseV1' }
    ProposalPayloadV1:
      type: object
      additionalProperties: false
      required: [schemaVersion, kind, title]
      properties:
        schemaVersion: { type: integer, const: 1 }
        kind: { type: string, enum: [task, reminder, commitment, goal, memory] }
        title: { type: string, minLength: 1, maxLength: 240 }
        detail: { type: string, minLength: 1, maxLength: 2000 }
        temporalPhrase: { type: string, minLength: 1, maxLength: 240 }
    ProposalResponseV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          sourceRevisionId,
          sourceSpanStart,
          sourceSpanEnd,
          proposalType,
          payload,
          authorityClass,
          assertionClass,
          confidence,
          uncertaintyIndicators,
          status,
          expiresAt,
          createdAt,
          version,
        ]
      properties:
        id: { type: string, format: uuid }
        sourceRevisionId: { type: string, format: uuid }
        sourceSpanStart: { type: integer, minimum: 0 }
        sourceSpanEnd: { type: integer, minimum: 1 }
        proposalType:
          { type: string, enum: [task, reminder, commitment, goal, memory] }
        payload: { $ref: '#/components/schemas/ProposalPayloadV1' }
        authorityClass:
          {
            type: string,
            enum:
              [
                ambiguous_command,
                inferred_structure,
                durable_claim,
                external_action_preview,
              ],
          }
        assertionClass:
          {
            type: string,
            enum:
              [
                explicit_statement,
                strong_interpretation,
                weak_inference,
                hypothesis,
              ],
          }
        confidence: { type: number, minimum: 0, maximum: 1 }
        uncertaintyIndicators:
          type: array
          maxItems: 8
          items: { type: string }
        status:
          {
            type: string,
            enum:
              [pending, accepted, edited_accepted, dismissed, stale, expired],
          }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
