        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/SessionInvalid' }
        '403': { $ref: '#/components/responses/CsrfInvalid' }
        '409': { $ref: '#/components/responses/Conflict' }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-meridian-session
      description: Production cookie name; local development omits the __Host prefix.
  parameters:
    CsrfHeader:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string, minLength: 32, maxLength: 256 }
      description: Must match the CSRF cookie and, for active sessions, its stored binding.
    RequestIdHeader:
      name: X-Request-ID
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: Stable command correlation identity; reuse it when retrying the same mutation.
    EntryIdPath:
      name: entryId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GoalIdPath:
      name: goalId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SchedulingProposalIdPath:
      name: schedulingProposalId
      in: path
      required: true
      schema: { type: string, format: uuid }
    BlockIdPath:
      name: blockId
      in: path
      required: true
      schema: { type: string, format: uuid }
    EdgeIdPath:
      name: edgeId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReceiptIdPath:
      name: receiptId
      in: path
      required: true
      schema: { type: string, format: uuid }
    KnowledgeSourceIdPath:
      name: sourceId
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    AuthIdentifierV1:
      type: string
      minLength: 3
      maxLength: 64
      pattern: '^[a-z0-9][a-z0-9._-]*$'
    PassphraseV1:
      type: string
      minLength: 16
      maxLength: 1024
      writeOnly: true
    RecoveryCodeV1:
      type: string
      pattern: '^MRD-[A-Z2-9]{8}-[A-Z2-9]{8}$'
      writeOnly: true
    MicrosoftStageAScopesV1:
      type: array
      minItems: 5
      maxItems: 5
      uniqueItems: true
      prefixItems:
        - { type: string, const: openid }
        - { type: string, const: profile }
        - { type: string, const: offline_access }
        - { type: string, const: User.Read }
        - { type: string, const: Calendars.Read }
      items: false
    MicrosoftConnectResponseV1:
      type: object
      additionalProperties: false
      required: [authorizationUrl]
      properties:
        authorizationUrl: { type: string, format: uri }
    MicrosoftDisconnectRequestV1:
      type: object
      additionalProperties: false
      required: [confirmation]
      properties:
        confirmation: { type: string, const: DISCONNECT }
    MicrosoftConsentRecordV1:
      type: object
      additionalProperties: false
      required: [action, occurredAt, scopes]
      properties:
        action:
          type: string
          enum: [granted, disconnected, reauthorization_required]
        occurredAt: { type: string, format: date-time }
        scopes: { $ref: '#/components/schemas/MicrosoftStageAScopesV1' }
    MicrosoftConnectionAccountV1:
      type: object
      additionalProperties: false
      required:
        [
          id,
          displayName,
          status,
          grantedScopes,
          connectedAt,
          disconnectedAt,
          lastRefreshedAt,
        ]
      properties:
        id: { type: string, format: uuid }
